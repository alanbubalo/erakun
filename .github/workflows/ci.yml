name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, sqlite3
          coverage: none

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Prepare app environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Cache Saxon-HE jars
        id: cache-saxon
        uses: actions/cache@v4
        with:
          path: resources/schemas/saxon
          key: saxon-${{ hashFiles('app/Console/Commands/InstallSchemas.php') }}

      - name: Install validation schemas (Saxon-HE)
        if: steps.cache-saxon.outputs.cache-hit != 'true'
        run: php artisan schema:install

      - name: Cache compiled Schematron XSLTs
        id: cache-compiled
        uses: actions/cache@v4
        with:
          path: resources/schemas/compiled
          key: schematron-${{ hashFiles('resources/schemas/en16931/**', 'resources/schemas/hr-cius/**', 'resources/schemas/skeleton/**', 'app/Console/Commands/CompileSchematron.php') }}

      - name: Compile Schematron to XSLT
        if: steps.cache-compiled.outputs.cache-hit != 'true'
        run: php artisan schema:compile

      - name: Run checks (lint, refactor, analyse, test)
        run: composer check
